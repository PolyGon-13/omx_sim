/**:
  controller_manager:
    ros__parameters:
      update_rate: 100  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      gripper_controller:
        type: position_controllers/GripperActionController

  joint_state_broadcaster:
    ros__parameters:
      # Humble's joint_state_broadcaster only filters when BOTH 'joints' and
      # 'interfaces' are set; if either is empty it publishes ALL state
      # interfaces. We must therefore set both.
      #
      # gripper_joint_2 is a mimic of gripper_joint_1, and gz_ros2_control
      # registers its state interface under the name 'gripper_joint_2_mimic'
      # (not 'gripper_joint_2'). That name is not in the MoveIt/URDF model, so
      # publishing it spams move_group with "Joint not found in model" errors.
      # We exclude gripper_joint_2 from the list entirely (listing it would also
      # break activation, since 'gripper_joint_2/position' does not exist). Its
      # pose is recovered by robot_state_publisher from the URDF <mimic> tag.
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - gripper_joint_1
      interfaces:
        - position
        - velocity

  arm_controller:
    ros__parameters:
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5

      interface_name: position

      command_interfaces:
        - position

      state_interfaces:
        - position
        - velocity

      allow_partial_joints_goal: true

  gripper_controller:
    ros__parameters:
      joint: gripper_joint_1
